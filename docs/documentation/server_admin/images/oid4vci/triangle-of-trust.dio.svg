<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="750" height="620" version="1.1" viewBox="0 0 750 620"><defs><linearGradient id="bg-grad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#eef2f6"/></linearGradient></defs><rect width="750" height="620" fill="url(#bg-grad)" rx="12"/><text x="375" y="40" fill="#1a202c" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Triangle of Trust — The Issuer-Holder-Verifier Model</text><line x1="115" x2="375" y1="160" y2="530" stroke="#3182ce" stroke-dasharray="10 5" stroke-width="2.5"/><line x1="635" x2="375" y1="160" y2="530" stroke="#3182ce" stroke-dasharray="10 5" stroke-width="2.5"/><line x1="115" x2="635" y1="160" y2="160" stroke="#a0aec0" stroke-dasharray="6 4" stroke-width="2"/><rect width="180" height="110" x="25" y="85" fill="#dae8fc" stroke="#2b6cb0" stroke-width="2.5" rx="12"/><text x="115" y="125" fill="#2b6cb0" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Issuer</text><text x="115" y="152" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">Signs and issues</text><text x="115" y="174" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">Verifiable Credentials</text><rect width="180" height="110" x="545" y="85" fill="#dae8fc" stroke="#2b6cb0" stroke-width="2.5" rx="12"/><text x="635" y="125" fill="#2b6cb0" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Verifier</text><text x="635" y="152" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">Validates credentials</text><text x="635" y="174" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">without contacting Issuer</text><rect width="250" height="95" x="250" y="470" fill="#dae8fc" stroke="#2b6cb0" stroke-width="2.5" rx="12"/><text x="375" y="505" fill="#2b6cb0" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Holder / Wallet</text><text x="375" y="532" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">Receives, stores, and presents</text><text x="375" y="554" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle">Verifiable Credentials</text><rect width="290" height="36" x="230" y="140" fill="#fff" stroke="#cbd5e0" stroke-width="1.5" opacity=".95" rx="8"/><text x="375" y="155" fill="#4a5568" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle">No direct communication — privacy by design</text><text x="375" y="170" fill="#718096" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle">Issuer never learns when or where credentials are used</text><rect width="160" height="44" x="140" y="280" fill="#fff" stroke="#3182ce" stroke-width="1.5" opacity=".95" rx="8"/><text x="220" y="303" fill="#2b6cb0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">OpenID4VCI</text><text x="220" y="322" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle">Credential Issuance</text><rect width="160" height="44" x="450" y="280" fill="#fff" stroke="#3182ce" stroke-width="1.5" opacity=".95" rx="8"/><text x="530" y="303" fill="#2b6cb0" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">OpenID4VP</text><text x="530" y="322" fill="#2d3748" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle">Credential Presentation</text><rect width="230" height="36" x="260" y="420" fill="#ebf8ff" stroke="#bee3f8" stroke-width="1.5" opacity=".95" rx="8"/><text x="375" y="438" fill="#2b6cb0" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Delegates control to the Holder</text><text x="375" y="454" fill="#4a5568" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle">Holder chooses what to share and with whom</text><text x="375" y="605" fill="#718096" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle">The separation of issuance from presentation prevents tracking and preserves user privacy.</text></svg>